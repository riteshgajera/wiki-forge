{% extends "base.html" %}
{% block title %}{{ slug }} — WIKI Forge{% endblock %}
{% block content %}
<div style="margin-bottom:16px">
  <a href="/articles" style="color:var(--text2);font-size:13px">← All Articles</a>
</div>

<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px">
  <div>
    <span class="badge {{ subdir }}" style="margin-bottom:8px;display:inline-block">{{ subdir }}</span>
    <div style="font-size:12px;color:var(--text2);font-family:var(--mono)">{{ subdir }}/{{ slug }}.md</div>
  </div>
  <div style="display:flex;gap:8px">
    <button class="btn" onclick="toggleRaw()">🗒 Raw</button>
    <button class="btn" onclick="copyRaw(this)">📋 Copy</button>
  </div>
</div>

<div class="card article-body" id="rendered-content">
  {{ content | safe }}
</div>

<pre id="raw-content" style="display:none;white-space:pre-wrap;font-size:13px;color:var(--text2)">{{ raw }}</pre>

<script>
function toggleRaw() {
  const r = document.getElementById('rendered-content');
  const raw = document.getElementById('raw-content');
  const hidden = raw.style.display === 'none';
  r.style.display = hidden ? 'none' : 'block';
  raw.style.display = hidden ? 'block' : 'none';
}
function copyRaw(btn) {
  navigator.clipboard.writeText(document.getElementById('raw-content').textContent).then(() => {
    btn.textContent = '✓ Copied!';
    setTimeout(() => btn.textContent = '📋 Copy', 2000);
  });
}
</script>
{% endblock %}
