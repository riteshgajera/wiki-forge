version: "3.11"

services:
  kb:
    build: .
    volumes:
      - ./raw:/app/raw
      - ./wiki:/app/wiki
      - ./data:/app/data
      - ./config:/app/config
    environment:
      - LLM__PROVIDER=${LLM__PROVIDER:-ollama}
      - LLM__MODEL=${LLM__MODEL:-llama3.2}
      - LLM__BASE_URL=http://ollama:11434
      - LLM__OPENAI_API_KEY=${LLM__OPENAI_API_KEY:-}
      - RAW_DIR=/app/raw
      - WIKI_DIR=/app/wiki
      - DB_PATH=/app/data/kb.db
      - VECTOR_STORE_PATH=/app/data/vectors
      - LOG_LEVEL=INFO
    ports:
      - "8000:8000"
    depends_on:
      - ollama
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    restart: unless-stopped
    # Uncomment for GPU support:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

volumes:
  ollama_data:
