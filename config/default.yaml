llm:
  provider: ollama
  model: llama3.2
  openai_api_key: ""
  base_url: "http://localhost:11434"
  temperature: 0.2
  max_tokens: 2000
  embed_model: "nomic-embed-text"

paths:
  raw_dir: "./raw"
  wiki_dir: "./wiki"
  db_path: "./data/kb.db"
  vector_store_path: "./data/vectors"

processing:
  chunk_size: 1500
  chunk_overlap: 200
  confidence_threshold: 0.7
  auto_approve_threshold: 0.85
  max_retries: 3
  batch_size: 10

ingestion:
  supported_extensions: [".md", ".txt", ".pdf", ".png", ".jpg", ".jpeg", ".rst", ".html"]
  watch_interval_seconds: 30

web:
  host: "0.0.0.0"
  port: 8000

logging:
  level: "INFO"
  format: "json"
